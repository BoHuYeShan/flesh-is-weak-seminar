name: Fetch Data and Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */2 * * *'  # 每2小时更新一次
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch Discussions Data
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // 确保 public/data 目录存在
            const dataDir = path.join(process.cwd(), 'public', 'data');
            if (!fs.existsSync(dataDir)) {
              fs.mkdirSync(dataDir, { recursive: true });
            }
            
            // 使用 GraphQL 获取所有 Discussions
            const query = `
              query {
                repository(owner: "${context.repo.owner}", name: "${context.repo.repo}") {
                  discussions(first: 100, orderBy: {field: CREATED_AT, direction: DESC}) {
                    nodes {
                      number
                      title
                      body
                      createdAt
                      updatedAt
                      comments { totalCount }
                      category { name id }
                      author { login avatarUrl url }
                      url
                    }
                  }
                  stargazerCount
                }
              }
            `;
            
            const response = await github.graphql(query);
            const discussions = response.repository.discussions.nodes;
            
            // 按分类整理数据
            const categories = {
              'Announcements': { id: 'DIC_kwDOSxxtP84C-jY2', name: '新闻', emoji: '📰' },
              'Show and tell': { id: 'DIC_kwDOSxxtP84C-jY6', name: '小工具', emoji: '🔧' },
              'General': { id: 'DIC_kwDOSxxtP84C-jY3', name: '讨论', emoji: '💬' },
              'Q&A': { id: 'DIC_kwDOSxxtP84C-jY4', name: '问答', emoji: '🙏' }
            };
            
            const allDiscussions = discussions.map(d => ({
              id: d.number,
              title: d.title,
              body: d.body?.substring(0, 300) || '',
              category: d.category?.name || 'General',
              categoryEmoji: categories[d.category?.name]?.emoji || '💬',
              author: d.author?.login || 'Unknown',
              avatar: d.author?.avatarUrl || '',
              authorUrl: d.author?.url || '',
              date: d.createdAt,
              dateFormatted: new Date(d.createdAt).toLocaleDateString('zh-CN'),
              comments: d.comments?.totalCount || 0,
              url: d.url
            }));
            
            // 获取贡献者
            const contribsResponse = await github.rest.repos.listContributors({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const contributors = contribsResponse.data.map(c => ({
              login: c.login,
              avatar: c.avatar_url,
              contributions: c.contributions,
              url: c.html_url
            }));
            
            // 保存数据
            const data = {
              discussions: allDiscussions,
              contributors: contributors,
              stats: {
                total: allDiscussions.length,
                news: allDiscussions.filter(d => d.category === 'Announcements').length,
                tools: allDiscussions.filter(d => d.category === 'Show and tell').length,
                discussions: allDiscussions.filter(d => d.category === 'General').length,
                contributors: contributors.length
              },
              updatedAt: new Date().toISOString()
            };
            
            // 下载头像到本地
            const avatarDir = path.join(process.cwd(), 'public', 'avatars');
            if (!fs.existsSync(avatarDir)) {
              fs.mkdirSync(avatarDir, { recursive: true });
            }
            
            // 收集所有需要下载的头像 URL
            const avatarUrls = new Set();
            allDiscussions.forEach(d => { if (d.avatar) avatarUrls.add(d.avatar); });
            contributors.forEach(c => { if (c.avatar) avatarUrls.add(c.avatar); });
            
            // 下载头像
            for (const url of avatarUrls) {
              try {
                const filename = url.split('/').pop().split('?')[0] + '.png';
                const response = await fetch(url);
                if (response.ok) {
                  const buffer = await response.arrayBuffer();
                  fs.writeFileSync(path.join(avatarDir, filename), Buffer.from(buffer));
                  // 更新 URL 为本地路径
                  const localPath = `./avatars/${filename}`;
                  allDiscussions.forEach(d => { if (d.avatar === url) d.avatar = localPath; });
                  contributors.forEach(c => { if (c.avatar === url) c.avatar = localPath; });
                }
              } catch (e) {
                console.log(`Failed to download avatar: ${url}`);
              }
            }
            
            fs.writeFileSync(
              path.join(dataDir, 'discussions.json'),
              JSON.stringify(data, null, 2)
            );
            
            console.log(`Fetched ${allDiscussions.length} discussions, ${contributors.length} contributors, ${avatarUrls.size} avatars`);

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: fetch-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
